<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPS – Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #faf9f6;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: min(300px, 72vw);
      margin-bottom: 3rem;
      filter: drop-shadow(0 0 40px rgba(0,85,128,0.3));
    }

    .divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #0077a8, transparent);
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(140deg, #1e293b 20%, #0077a8 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      color: #64748b;
    }

    .visitor-counter {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: #94a3b8;
      letter-spacing: 0.04em;
    }

    .visitor-counter svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #94a3b8;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .counter-digits {
      display: flex;
      gap: 3px;
    }

    .counter-digits span {
      background: rgba(0, 119, 168, 0.07);
      border: 1px solid rgba(0, 119, 168, 0.12);
      border-radius: 4px;
      padding: 2px 5px;
      font-family: 'Segoe UI', monospace;
      font-weight: 600;
      font-size: 0.8rem;
      color: #0077a8;
      min-width: 1.4em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Logo_MPS_background_white_small.png" alt="MPS Logo" class="logo" />
    <div class="divider"></div>
    <h1>Coming Soon</h1>
    <p>We're working on something great. Stay tuned.</p>
  </div>

  <div class="visitor-counter">
    <svg viewBox="0 0 24 24">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <span>Visitors</span>
    <div class="counter-digits" id="visitorDigits"></div>
  </div>

  <script>
    (function() {
      var COUNTER_URL = 'https://script.google.com/macros/s/AKfycbz2xIb3UYbMl2PcXefhH0LiiYWgTbUcFloTVQoIE_88p8vsOmBzFIlWbZlEcwqMRDN5/exec';
      var SESSION_KEY = 'mps_visited';
      var isNew = !sessionStorage.getItem(SESSION_KEY);
      var action = isNew ? 'increment' : 'get';
      var cbName = '_mpsVisitor' + Date.now();

      function renderDigits(count) {
        var digits = String(count).padStart(5, '0');
        var container = document.getElementById('visitorDigits');
        container.innerHTML = '';
        for (var i = 0; i < digits.length; i++) {
          var span = document.createElement('span');
          span.textContent = digits[i];
          container.appendChild(span);
        }
      }

      // JSONP callback
      window[cbName] = function(data) {
        if (isNew) sessionStorage.setItem(SESSION_KEY, '1');
        renderDigits(data.count || 0);
        delete window[cbName];
      };

      // Lade Zähler via Script-Tag (umgeht CORS)
      var s = document.createElement('script');
      s.src = COUNTER_URL + '?action=' + action + '&callback=' + cbName;
      s.onerror = function() { renderDigits(0); };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
