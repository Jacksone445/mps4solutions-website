<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPS – Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #faf9f6;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: min(300px, 72vw);
      margin-bottom: 3rem;
      filter: drop-shadow(0 0 40px rgba(0,85,128,0.3));
    }

    .divider {
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #0077a8, transparent);
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(140deg, #1e293b 20%, #0077a8 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Logo_MPS_background_white_small.png" alt="MPS Logo" class="logo" />
    <div class="divider"></div>
    <h1>Coming Soon</h1>
    <p>We're working on something great. Stay tuned.</p>
  </div>
</body>
</html>
